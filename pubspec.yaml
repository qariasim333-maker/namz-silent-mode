name: namaz_silent_mode
description: Automatically switch phone to Silent/Vibrate/DND during prayer times.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Background scheduling
  workmanager: ^0.5.2
  android_alarm_manager_plus: ^4.0.4

  # Permissions
  permission_handler: ^11.3.1

  # Prayer times calculation
  adhan: ^2.0.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # UI / Material 3
  flutter_local_notifications: ^17.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  table_calendar: ^3.1.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.10
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
